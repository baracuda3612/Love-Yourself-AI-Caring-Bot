# Plan Recipe — SHORT і MEDIUM
# Це не параметри які збираємо від юзера.
# Це фіксований контракт: план_тип → скільки днів → які слоти → яка механіка.

SHORT:
  user_facing_label: "7 днів"
  active_days_count: 7
  slots:
    - slot: DAY
      preferred_mechanic: switch

MEDIUM:
  user_facing_label: "14 днів"
  active_days_count: 14
  slots:
    - slot: DAY
      preferred_mechanic: switch
    - slot: EVENING
      preferred_mechanic: unload   # unload preferred, switch also allowed
      fallback_mechanic: switch

# Правила:
# - Перший план завжди SHORT. Без вибору, без підтвердження типу.
# - MEDIUM стає доступним після першого завершеного плану.
# - evening_slot_collected зберігається в user_profiles — збирається ОДИН РАЗ
#   при першому виборі MEDIUM. Більше ніколи не питаємо.
#
# Builder логіка:
#   candidates = [ex for ex in library
#                 if ex.mechanic == preferred_mechanic
#                 and cooldown_ok]
#   if not candidates: fallback to fallback_mechanic
#   selected = weighted_random(candidates, weight=ex.weight)
#
# allowed_slots — derived від mechanic, не stored в вправі:
#   switch → [DAY, EVENING]
#   unload → [EVENING]
#
# MORNING не використовується в P1. DAY/EVENING — внутрішні теги, юзер бачить HH:MM.
